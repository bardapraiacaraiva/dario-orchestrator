name: License — Obfuscated Build + Sign

# Builds the Cython-compiled license artefacts on Linux (gcc) and Windows
# (MSVC available on the runner), then signs the PyInstaller bundle with
# the self-signed cert generated by `scripts/gen_self_signed_cert.py`.
#
# Triggers:
#   • Manual via workflow_dispatch (`Actions` tab → Run workflow)
#   • On push of release tags `release/license-vX.Y.Z`
#
# Outputs (uploaded as workflow artefacts):
#   • license-binaries-linux       .so files + dario-license ELF
#   • license-binaries-windows     .pyd files + dario-license.exe (signed)
#
# These artefacts complete the Onda 9 #2 + #3 stack — closes the
# "requires Cython build" and "signature invalidation" gaps from the
# Onda 9 honest-status table.

on:
  workflow_dispatch:
  push:
    tags:
      - 'release/license-v*'

defaults:
  run:
    working-directory: orchestrator

jobs:
  build-linux:
    name: Cython build (Linux gcc)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install C toolchain + Python deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential python3-dev binutils
          pip install "Cython>=3.0" "setuptools>=70" \
              "fastapi>=0.135" "uvicorn>=0.38" "pydantic>=2.12" \
              "cryptography>=42" "anthropic>=0.87"

      - name: Cython compile (in-place)
        run: python build_obfuscated.py

      - name: Strip symbols from compiled extensions
        run: |
          find . -maxdepth 3 -name "*.so" -exec strip --strip-unneeded {} \;
          find . -maxdepth 3 -name "*.so" -ls

      - name: Verify obfuscation — honest threshold check
        run: |
          set +e
          # Cython preserves function names by design (Python introspection).
          # Function names showing up via grep is normal and unavoidable
          # without commercial obfuscators (PyArmor / Nuitka).
          #
          # What we DO check: secret-bearing strings should not appear in
          # clear text. Specifically: MASTER_SECRET value, raw key prefixes,
          # and the "DARIO-" license prefix.
          echo "=== Verifying secret-bearing strings absent ==="
          FAIL=0
          for forbidden in "MASTER_SECRET" ".master_secret" "DARIO-PROD-"; do
            if grep -a "$forbidden" license_manager*.so 2>/dev/null; then
              echo "FAIL: '$forbidden' literal present in compiled binary"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then
            echo "Above strings should never appear in distribution binary."
            exit 1
          fi
          echo "OK — no secret-bearing strings in compiled binary"
          echo
          echo "=== Informational: function name count (expected non-zero) ==="
          grep -ao "license_manager\.[a-zA-Z_]*" license_manager*.so | sort -u | wc -l
          echo "(Cython preserves function names — combined with signing + server validation, bypass cost is ~3 days expert.)"

      - name: Remove .py sources (distribution mode)
        run: python build_obfuscated.py --remove-py

      - name: Upload Linux artefacts
        uses: actions/upload-artifact@v4
        with:
          name: license-binaries-linux
          path: |
            orchestrator/license_client*.so
            orchestrator/license_manager*.so
            orchestrator/license_server/app*.so
          retention-days: 30

  build-windows:
    name: Cython build + PyInstaller + sign (Windows)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python deps
        shell: bash
        run: |
          pip install "Cython>=3.0" "setuptools>=70" pyinstaller \
              "fastapi>=0.135" "uvicorn>=0.38" "pydantic>=2.12" \
              "cryptography>=42" "anthropic>=0.87"

      # MSVC Build Tools come pre-installed on windows-latest GH runner.
      - name: Cython compile (in-place)
        shell: bash
        run: python build_obfuscated.py

      - name: Verify obfuscation — honest threshold check
        shell: bash
        run: |
          set +e
          # Same honest check as the Linux job — see comment there for rationale.
          echo "=== Verifying secret-bearing strings absent ==="
          FAIL=0
          for forbidden in "MASTER_SECRET" ".master_secret" "DARIO-PROD-"; do
            if grep -a "$forbidden" license_manager*.pyd 2>/dev/null; then
              echo "FAIL: '$forbidden' literal present in compiled .pyd"
              FAIL=1
            fi
          done
          if [ $FAIL -eq 1 ]; then exit 1; fi
          echo "OK — no secret-bearing strings in compiled .pyd"

      - name: Generate self-signed code-signing cert for CI demonstration
        shell: pwsh
        run: python scripts/gen_self_signed_cert.py --pfx ci-cert.pfx --password ci-build

      - name: PyInstaller bundle
        shell: bash
        run: |
          pyinstaller scripts/dario_license.spec --clean --noconfirm
          ls -lh dist/

      - name: Sign the bundle with the self-signed cert
        shell: bash
        env:
          DARIO_CERT_PFX_PASSWORD: ci-build
        run: |
          python scripts/sign_bundle.py dist/dario-license.exe --pfx ci-cert.pfx
          echo "=== signtool verify ==="
          "/c/Program Files (x86)/Windows Kits/10/bin/x64/signtool.exe" \
              verify /pa /v dist/dario-license.exe || echo "Verify warns for self-signed (expected)"

      - name: Upload Windows artefacts
        uses: actions/upload-artifact@v4
        with:
          name: license-binaries-windows
          path: |
            orchestrator/license_client*.pyd
            orchestrator/license_manager*.pyd
            orchestrator/license_server/app*.pyd
            orchestrator/dist/dario-license.exe
          retention-days: 30

  # ───────────────────────────────────────────────────────────────────────────
  # Fix 2 (2026-05-23) — publish artefacts as a GitHub Release asset on
  # release/license-v* tag pushes, so the npx installer's `--obfuscated`
  # mode can download them directly without GH auth.
  # ───────────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/release/license-v')
    permissions:
      contents: write
    steps:
      - name: Download Linux artefacts
        uses: actions/download-artifact@v4
        with:
          name: license-binaries-linux
          path: ./linux

      - name: Download Windows artefacts
        uses: actions/download-artifact@v4
        with:
          name: license-binaries-windows
          path: ./windows

      - name: Bundle per-platform tarballs
        run: |
          set -eux
          tar -czf license-binaries-linux-x64.tar.gz -C linux .
          (cd windows && zip -r ../license-binaries-windows-x64.zip .)
          ls -lh license-binaries-*.tar.gz license-binaries-*.zip
          sha256sum license-binaries-*.tar.gz license-binaries-*.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release with binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: License binaries — ${{ github.ref_name }}
          body: |
            Cython-compiled license artefacts for ${{ github.ref_name }}.

            Includes:
              • license_manager.{pyd,so} — Cython-compiled, symbol-stripped
              • license_client.{pyd,so}
              • license_server/app.{pyd,so}
              • dario-license.exe — PyInstaller bundle (signed with self-signed cert)

            See SHA256SUMS.txt for integrity verification.

            Triggered by tag: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
          files: |
            license-binaries-linux-x64.tar.gz
            license-binaries-windows-x64.zip
            SHA256SUMS.txt
          draft: false
          prerelease: false
