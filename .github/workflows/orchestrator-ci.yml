name: DARIO Orchestrator CI

on:
  push:
    paths:
      - "orchestrator/**"
      - ".github/workflows/orchestrator-ci.yml"
  pull_request:
    paths:
      - "orchestrator/**"
      - ".github/workflows/orchestrator-ci.yml"

# Cancel in-progress runs when a new push lands.
concurrency:
  group: orchestrator-ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: orchestrator

jobs:
  ruff:
    name: Ruff (lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.13"

      - name: Ruff check
        run: python -m ruff check .

  mypy:
    name: Mypy (foundational modules)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install runtime + mypy
        run: |
          pip install "mypy>=1.13" "pydantic>=2.12" "fastapi>=0.135" \
              "pyyaml>=6.0" "langgraph>=1.1" "langgraph-checkpoint-sqlite>=2.0" \
              "opentelemetry-api>=1.30" "opentelemetry-sdk>=1.30" \
              "opentelemetry-exporter-otlp>=1.30" "temporalio>=1.10" \
              "dspy>=2.5"

      - name: Mypy strict on foundational modules (post-Phase 4 paths)
        run: |
          python -m mypy --follow-imports=skip \
              schemas config optimization \
              observability/otel_setup.py \
              cognitive/chain_graph.py execution/chain_schemas.py \
              upgrades/intelligence_qvalue.py upgrades/intelligence_tiered.py \
              upgrades/intelligence_kg.py upgrades/intelligence_router.py \
              upgrades/intelligence_tools.py upgrades/intelligence_benchmark.py \
              upgrades/intelligence_metrics.py \
              upgrades/core_handoff.py upgrades/core_messagebus.py \
              upgrades/core_checkpoints.py upgrades/core_engines.py \
              upgrades/execution_parallel.py \
              durable memory dream \
              enforcement safety finance cognitive licensing \
              license_server licensing/license_client.py

  pytest-fast:
    name: Pytest fast (${{ matrix.os }} / py${{ matrix.python }})
    # Faixa 2 #2 (2026-05-25): cross-platform matrix.
    # Linux is the workhorse; Mac + Win catch platform-specific bugs
    # (e.g., the Windows-specific dream/merge.py rename collision).
    # fail-fast=false so one OS doesn't mask another's failure.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.13"]
        include:
          # Also test on Python 3.12 for compat (3.13 is required-min in
          # pyproject; 3.12 confirms we don't accidentally use 3.13-only).
          - os: ubuntu-latest
            python: "3.12"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install with test extras
        shell: bash
        run: |
          pip install -e ".[test,observability]" \
              "langgraph-checkpoint-sqlite>=2.0" "temporalio>=1.10" \
              "dspy>=2.5" "deepeval>=3.9"

      - name: Run fast tests (aligned with pre-push hook markers)
        shell: bash
        env:
          # Skip Ollama-dependent paths; conftest auto-mocks _embed by default.
          DARIO_TEST_MODE: "1"
        run: |
          # Marker filter MUST match scripts/hooks/pre-push to avoid CI/local drift.
          # vip_only marker deprecated 2026-05-25 (Risk #7 open-everything).
          python -m pytest tests/ -m "not slow" \
              --maxfail=5 \
              --tb=short \
              -q

  pytest-slow:
    name: Pytest slow suite (pre-push equivalent)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Slow suite runs only on PRs and main pushes — not on every feature branch.
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install with test extras
        run: |
          pip install -e ".[test,observability]" \
              "langgraph-checkpoint-sqlite>=2.0" "temporalio>=1.10" \
              "dspy>=2.5" "deepeval>=3.9"

      - name: Run slow tests
        env:
          DARIO_TEST_MODE: "1"
        run: |
          python -m pytest tests/ -m "slow" \
              --maxfail=5 \
              --tb=short \
              -q

  security:
    name: Supply chain (pip-audit + SBOM)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    # Faixa 1 #4 (2026-05-25): vulnerability scan + Software Bill of Materials.
    # Goal: detect CVEs in transitive deps + generate auditable SBOM for
    # buyers/auditors. Non-blocking on initial deploy (continue-on-error)
    # to avoid breaking the build on day-1; flip to hard-fail once we've
    # triaged the initial set of findings (~2 weeks).
    permissions:
      contents: read
      security-events: write  # for SARIF upload (future)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install audit tooling
        run: |
          pip install pip-audit "cyclonedx-bom>=4.5"

      - name: Install project deps (for scanning)
        run: |
          pip install -e .

      - name: pip-audit (vulnerability scan)
        # --strict means real CVEs only; --vulnerability-service osv uses OSV
        # database (Google) which has wider PyPI coverage than PyPI's own.
        # Fail-soft initially — surfaces the findings without blocking.
        run: |
          pip-audit --strict --vulnerability-service osv --format json \
                    --output pip-audit.json || true
          pip-audit --strict --vulnerability-service osv \
                    --format columns || true
        continue-on-error: true

      - name: Generate SBOM (CycloneDX)
        # Standard format consumed by Snyk, Dependency-Track, MS Defender,
        # GitHub Advanced Security. JSON + XML for max consumer compat.
        run: |
          cyclonedx-py environment --output-file sbom.json --output-format json
          cyclonedx-py environment --output-file sbom.xml --output-format xml

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-${{ github.sha }}
          path: |
            orchestrator/pip-audit.json
            orchestrator/sbom.json
            orchestrator/sbom.xml
          retention-days: 90

      - name: Summary
        run: |
          echo "## Supply Chain Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f pip-audit.json ]; then
            VULN_COUNT=$(python -c "import json; d=json.load(open('pip-audit.json')); print(sum(len(p.get('vulns',[])) for p in d.get('dependencies',[])))")
            echo "- pip-audit vulnerabilities: **$VULN_COUNT**" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f sbom.json ]; then
            COMP_COUNT=$(python -c "import json; d=json.load(open('sbom.json')); print(len(d.get('components',[])))")
            echo "- SBOM components catalogued: **$COMP_COUNT**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Artifacts retained 90 days for compliance/audit." >> $GITHUB_STEP_SUMMARY

  summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [ruff, mypy, pytest-fast, security]
    if: always()
    steps:
      - name: Report
        run: |
          echo "Ruff:               ${{ needs.ruff.result }}"
          echo "Mypy:               ${{ needs.mypy.result }}"
          echo "Pytest fast matrix: ${{ needs.pytest-fast.result }}"
          echo "Security:           ${{ needs.security.result }} (non-blocking for now)"
          # Security is non-blocking until we've triaged baseline findings.
          # pytest-fast.result is "success" only if ALL matrix combos pass.
          if [ "${{ needs.ruff.result }}" != "success" ] || \
             [ "${{ needs.mypy.result }}" != "success" ] || \
             [ "${{ needs.pytest-fast.result }}" != "success" ]; then
            exit 1
          fi
