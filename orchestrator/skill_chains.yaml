# ═══════════════════════════════════════════════════════════════
# PROTOCOLO DE EXECUÇÃO
# ═══════════════════════════════════════════════════════════════

execution_protocol:
  # 1. Detecção
  detection: "Dispatch verifica trigger_keywords. Se match → activa chain em vez de skill individual."

  # 2. Contexto inicial
  context_injection: |
    O primeiro skill da chain recebe o pedido do user.
    Cada skill subsequente recebe:
    - O output do skill anterior (campos definidos em pass_to_next)
    - O contexto original do user
    - O chain_id para tracking

  # 3. Passagem automática
  auto_handoff: |
    Quando um skill completa:
    1. Quality gate: verificar score >= threshold (default 70)
    2. Se passou: extrair campos de pass_to_next do output
    3. Construir prompt para próximo skill com: contexto + output anterior
    4. Lançar próximo skill automaticamente (sem voltar ao CEO)
    5. Log: DARIO_CHAIN_{chain_id}_STEP_{n}_COMPLETE

  # 4. Se falhar
  on_step_failure: |
    1. Retry 1x com prompt ajustado
    2. Se falhar de novo: PARAR chain
    3. Log: DARIO_CHAIN_{chain_id}_STEP_{n}_FAILED
    4. Entregar output parcial (tudo que completou até ao ponto de falha)
    5. Notificar user: "A chain parou no step N. Entreguei o que foi produzido até aqui."

  # 5. Resultado final
  on_chain_complete: |
    1. Juntar todos os outputs numa entrega unificada
    2. Calcular quality score médio da chain
    3. Log: DARIO_CHAIN_{chain_id}_COMPLETE (score, tokens, duration)
    4. Se score >= 90: log como success pattern para Evolutionary Delta
    5. Actualizar synaptic_weights dos pares de skills que participaram

  # 6. Tracking
  chain_tracking:
    log_code_start: "DARIO_CHAIN_START_{chain_name}"
    log_code_step: "DARIO_CHAIN_STEP_{n}_{skill}_DONE"
    log_code_complete: "DARIO_CHAIN_COMPLETE_{chain_name}_{score}"
    log_code_fail: "DARIO_CHAIN_FAIL_{chain_name}_AT_STEP_{n}"
