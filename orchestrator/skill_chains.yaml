## DARIO Skill Chaining — Auto-Sequential Execution
## Quando um skill termina, o próximo da chain arranca sozinho.
## O output de cada etapa é input da próxima. Zero intervenção do CEO entre etapas.
##
## Diferente de Composite Modes (paralelo) — chains são SEQUENCIAIS com dependência.
## Diferente de Taskboard (manual) — chains são AUTOMÁTICAS sem dispatch entre etapas.

# ═══════════════════════════════════════════════════════════════
# COMO FUNCIONA:
#
#   User pede: "cria marca completa para restaurante"
#   Orchestrator detecta: chain "brand_to_market"
#   Executa:
#     1. dario-brand      → output: posicionamento, archetype, mensagem
#        ↓ (output passa automaticamente)
#     2. dario-naming      → recebe: posicionamento → output: nome, domínio
#        ↓
#     3. dario-offer       → recebe: posicionamento + nome → output: Grand Slam Offer
#        ↓
#     4. dario-sales-letter → recebe: tudo acima → output: copy de venda
#        ↓
#     5. dario-email-seq    → recebe: offer + copy → output: sequência de emails
#
#   Resultado: pacote completo Brand→Nome→Oferta→Copy→Emails
#   Sem o CEO intervir entre etapas. Automático.
# ═══════════════════════════════════════════════════════════════

chains:

  # ── MARKETING ──

  brand_to_market:
    name: "Da Marca ao Mercado"
    description: "Posicionamento → Naming → Oferta → Sales Letter → Email Sequence"
    trigger_keywords: ["marca completa", "brand completo", "do zero ao mercado", "marca ate vendas"]
    steps:
      - skill: dario-brand
        receives: "briefing do user (cliente, industria, concorrentes)"
        produces: "posicionamento, archetype, messaging hierarchy, diferenciacao"
        pass_to_next: [posicionamento, archetype, tom_de_voz, diferenciadores]

      - skill: dario-naming
        receives: "posicionamento + archetype do step anterior"
        produces: "3-5 nomes candidatos, analise linguistica, dominio check"
        pass_to_next: [nome_escolhido, dominio]

      - skill: dario-offer
        receives: "posicionamento + nome + diferenciadores"
        produces: "Grand Slam Offer (value equation, pricing, bonuses, garantia)"
        pass_to_next: [oferta_completa, pricing, bonuses, garantia]

      - skill: dario-sales-letter
        receives: "posicionamento + nome + oferta completa"
        produces: "Sales letter longa (Halbert/Schwartz/Brunson)"
        pass_to_next: [headline, lead, body, cta]

      - skill: dario-email-seq
        receives: "oferta + sales letter + tom de voz"
        produces: "Sequencia de 7 emails (soap opera + indoctrination)"
        pass_to_next: null  # fim da chain

    on_complete: "Gerar pacote unificado: Brand Guide + Naming + Offer + Sales Letter + Emails"
    estimated_tokens: 35000
    quality_gate: "cada step deve ter score >= 70 para avançar. Se falhar, retry 1x antes de parar."

  brand_to_ads:
    name: "Da Marca aos Anúncios"
    description: "Posicionamento → Oferta → Funil → Ads Blueprint"
    trigger_keywords: ["marca ate anuncios", "brand to ads", "funil completo"]
    steps:
      - skill: dario-brand
        receives: "briefing do user"
        produces: "posicionamento, archetype"
        pass_to_next: [posicionamento, archetype, tom_de_voz]

      - skill: dario-offer
        receives: "posicionamento"
        produces: "Grand Slam Offer"
        pass_to_next: [oferta_completa, value_equation]

      - skill: dario-funnel
        receives: "posicionamento + oferta"
        produces: "Funil completo (lead magnet, tripwire, core, profit maximizer)"
        pass_to_next: [funil_estrutura, paginas, ctas]

      - skill: dario-ads-blueprint
        receives: "posicionamento + oferta + funil"
        produces: "Blueprint de anuncios (audiences, creative, budget, metricas)"
        pass_to_next: null

    on_complete: "Pacote GTM: Brand + Offer + Funnel + Ads"
    estimated_tokens: 30000

  # ── AUDITORIA ──

  audit_to_fix:
    name: "Da Auditoria à Correção"
    description: "Diagnóstico → Auditoria WP → Auditoria SEO → CWV Fix → Relatório"
    trigger_keywords: ["audita e corrige", "audit and fix", "diagnostico completo com correcao"]
    steps:
      - skill: dario-diagnose
        receives: "URL do site + briefing"
        produces: "diagnostico holístico, triage CRITICO/IMPORTANTE/OTIMIZACAO"
        pass_to_next: [problemas_criticos, prioridades, url]

      - skill: dario-wp-audit
        receives: "URL + problemas criticos do diagnostico"
        produces: "audit WP completo (performance, seguranca, plugins, theme)"
        pass_to_next: [issues_wp, score, recomendacoes]

      - skill: seo-audit
        receives: "URL + diagnostico"
        produces: "audit SEO completo (technical, content, schema, links)"
        pass_to_next: [issues_seo, score, keywords]

      - skill: dario-cwv-fix
        receives: "issues WP + issues SEO (só os fixáveis por código)"
        produces: "patches aplicados, antes/depois CWV"
        pass_to_next: [fixes_aplicados, metricas_antes_depois]

    on_complete: "Relatório unificado: Diagnóstico + Audit WP + Audit SEO + Fixes Aplicados"
    estimated_tokens: 45000
    quality_gate: "diagnóstico deve ter score >= 60 para chain continuar"

  # ── SEO ──

  seo_full_pipeline:
    name: "Pipeline SEO Completo"
    description: "Keywords → Clusters → Content Plan → Schema → Sitemap"
    trigger_keywords: ["seo completo", "seo do zero", "estrategia seo total"]
    steps:
