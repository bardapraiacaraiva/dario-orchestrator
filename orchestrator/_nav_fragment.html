<!-- DARIO Dashboards Navigation (v12.1 — integrated 2026-05-22) -->
<style>
.dario-nav{position:fixed;top:12px;right:12px;display:flex;gap:6px;flex-wrap:wrap;z-index:9999;
  background:rgba(10,14,26,.92);border:1px solid #2a3a5a;border-radius:10px;padding:8px;
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);font-family:-apple-system,Segoe UI,sans-serif}
.dario-nav a{padding:5px 10px;border-radius:6px;background:#1a2235;border:1px solid #2a3a5a;
  color:#f0f4ff;text-decoration:none;font-size:11px;font-weight:600;transition:all .2s}
.dario-nav a:hover{background:#2a3a5a;border-color:#00e5ff;color:#00e5ff}
.dario-nav a.active{background:rgba(0,229,255,.2);border-color:#00e5ff;color:#00e5ff}
.dario-nav-label{color:#8896b3;font-size:10px;text-transform:uppercase;letter-spacing:.1em;padding:5px 4px 5px 8px;font-weight:700}
@media(max-width:760px){.dario-nav{position:static;margin:8px}}
</style>
<nav class="dario-nav" aria-label="Dashboards DARIO">
  <span class="dario-nav-label">DARIO <span aria-hidden="true">&#9656;</span></span>
  <a href="dashboard.html" data-page="dashboard"><span aria-hidden="true">&#128202;</span> Live</a>
  <a href="mission-control.html" data-page="mission-control"><span aria-hidden="true">&#128640;</span> Mission</a>
  <a href="agent-visualizer.html" data-page="agent-visualizer"><span aria-hidden="true">&#129504;</span> Visualizer</a>
  <a href="agent_display.html" data-page="agent_display"><span aria-hidden="true">&#127760;</span> Display</a>
  <a href="cognitive_dashboard.html" data-page="cognitive_dashboard"><span aria-hidden="true">&#129516;</span> Cognitive</a>
  <a href="cfo_dashboard.html" data-page="cfo_dashboard"><span aria-hidden="true">&#128176;</span> CFO</a>
</nav>
<script>
(function(){
  var page = window.location.pathname.split('/').pop().replace('.html','');
  document.querySelectorAll('.dario-nav a').forEach(function(a){
    if (a.dataset.page === page) a.classList.add('active');
  });
})();
</script>
