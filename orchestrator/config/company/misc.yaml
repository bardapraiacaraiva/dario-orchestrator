heartbeat_defaults:
  manager:
    interval_minutes: 30
    cooldown_minutes: 5
    coalesce_if_active: true
  worker:
    interval_minutes: 0
    cooldown_minutes: 2
    coalesce_if_active: true
  service:
    interval_minutes: 5
    cooldown_minutes: 1
    coalesce_if_active: true
routines:
  daily_standup:
    trigger: schedule
    schedule: 0 9 * * 1-5
    timezone: Europe/Lisbon
    action: Review all in_progress tasks, flag stale (>24h no update), report blockers
    concurrency: skip_if_active
  weekly_review:
    trigger: schedule
    schedule: 0 18 * * 5
    timezone: Europe/Lisbon
    action: 'Summarize week: tasks completed, tasks carried, budget spent, blockers, next week priorities'
    concurrency: skip_if_active
  knowledge_refresh:
    trigger: schedule
    schedule: 0 3 * * 0
    timezone: Europe/Lisbon
    action: Run knowledge decay check, flag stale sources, trigger RAG self-improvement
    concurrency: skip_if_active
  client_pulse:
    type: worker
    trigger: schedule
    schedule: 0 10 * * 1
    timezone: Europe/Lisbon
    action: Check all active projects for stale tasks, pending client responses, approaching deadlines
    concurrency: skip_if_active
