# Compliance disclaimers
disclaimers:
  liability: >
    LEX-BR é assistente de IA, não substitui assessoria jurídica. Todas as
    análises e peças geradas requerem revisão por advogado inscrito na OAB.
    Provimento OAB 205/2021 art. 6º: o advogado é único responsável pelo
    conteúdo final.

  not_legal_advice: >
    Nenhum output deste sistema constitui aconselhamento jurídico autónomo.
    É ferramenta de produtividade sob responsabilidade do profissional.

  jurisdiction_limit: >
    Especializado em Direito Brasileiro. Para Direito Internacional ou de
    outros países, consultar advogado habilitado na jurisdição relevante.
