# Model routing cost thresholds
routing:
  # Use Haiku if predicted quality impact < 5 points
  haiku_quality_threshold: 5
  # Use Sonnet for most tasks (default)
  default_model: sonnet
  # Use Opus only for critical/complex tasks
  opus_triggers:
    - execution_policy: critical
    - predicted_score_delta: ">15"
    - skill_minimum: opus
