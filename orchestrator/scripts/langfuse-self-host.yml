# DARIO Orchestrator — Langfuse self-host (Onda 1 #4)
# =====================================================
# Stand up Langfuse + Postgres locally on ports 3000/5432.
# Usage:
#     cd ~/.claude/orchestrator/scripts
#     docker compose -f langfuse-self-host.yml up -d
#
# Then set in your shell (or systemd unit):
#     export LANGFUSE_HOST=http://localhost:3000
#     export LANGFUSE_PUBLIC_KEY=pk-lf-...    # from /project/settings UI
#     export LANGFUSE_SECRET_KEY=sk-lf-...
#
# Once those are exported, restart runtime.py — OTel auto-switches from
# console exporter to OTLP→Langfuse and traces appear in the UI.
#
# Stop:
#     docker compose -f langfuse-self-host.yml down
# Wipe data:
#     docker compose -f langfuse-self-host.yml down -v
services:
  langfuse-db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: change_me_in_prod
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10

  langfuse:
    image: langfuse/langfuse:2
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:change_me_in_prod@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: REPLACE_WITH_OPENSSL_RAND_BASE64_32
      SALT: REPLACE_WITH_OPENSSL_RAND_BASE64_32
      TELEMETRY_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: dario
      LANGFUSE_INIT_ORG_NAME: DARIO
      LANGFUSE_INIT_PROJECT_ID: orchestrator
      LANGFUSE_INIT_PROJECT_NAME: orchestrator
      LANGFUSE_INIT_USER_EMAIL: admin@dario.local
      LANGFUSE_INIT_USER_NAME: admin
      LANGFUSE_INIT_USER_PASSWORD: change_me_in_prod

volumes:
  langfuse-pg-data:
