prometheus_governance:
  wave: 1
  autonomy_tier: 0
  green_list_auto_actions: []
  yellow_list_post_review: []
  red_list_always_user_approval:
  - edit_any_skill
  - edit_company_yaml
  - edit_skill_chains_yaml
  - delete_memory_entry
  - push_to_repos
  - modify_license_files
  write_allowed_paths:
  - ~/.claude/orchestrator/prometheus/digests/*.md
  - ~/.claude/orchestrator/prometheus/state/*.yaml
  read_only_paths_external:
  - https://api.github.com/*
  - https://export.arxiv.org/*
  - https://www.anthropic.com/*
  - https://dre.pt/*
  - https://eur-lex.europa.eu/*
  - https://www.gov.br/anpd/*
