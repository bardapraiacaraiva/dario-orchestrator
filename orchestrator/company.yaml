workers:
  worker-brand:
    type: worker
    skill: dario-brand
    skill_client_facing: dario-brand-polished  # Padrão A wrapper, Tier 2 (validated 2026-05-24)
    requires_briefing_validation: true         # Pre-flight: competitive context + tone + archetype hint
    reports_to: dir-marketing
    capabilities:
    - brand_positioning
    - archetype_mapping
    - messaging_hierarchy
    - differentiation
  worker-offer:
    type: worker
    skill: dario-offer
    skill_client_facing: dario-offer-polished  # Padrão A wrapper, Tier 1 (validated 2026-05-24, +6.5 mean lift)
    reports_to: dir-marketing
    capabilities:
    - offer_creation
    - value_equation
    - pricing_tiers
    - guarantees
    watches:
    - dario-brand
    watch_condition: score >= 70
  worker-sales-letter:
    type: worker
    skill: dario-sales-letter
    skill_client_facing: dario-sales-letter-polished  # Padrão A wrapper, Tier 2 (validated 2026-05-24)
    requires_briefing_validation: true                # Pre-flight: testimonials + offer terms + awareness level
