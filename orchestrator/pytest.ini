[pytest]
testpaths = tests
markers =
    slow: tests that take >5s (subprocess, LLM, embeddings, full integrity gate)
    fast: tests that complete in <1s (pure unit tests, no I/O)
    integration: tests that exercise multiple modules together
    vip_only: DEPRECATED — VIP gating removed 2026-05-25 (Risk #7). Marker kept for backward compat; tests run normally.
    real_embedding: bypass Ollama mock and call real _embed() (requires Ollama running)
    requires_live_env: needs a populated ~/.claude (runtime tasks/goldens/episodes/orch DB) — runs locally via pre-push, excluded in clean CI (2026-06-14, see conftest _LIVE_ENV_TESTS)
# -p no:deepeval disables the deepeval pytest plugin, which auto-registers via
# entry-point because deepeval is a runtime dep. The plugin pins CPU at 100%
# and turns a 1.8s test run into minutes (Fase 1 audit, 2026-06-12). The
# dedicated eval suite re-enables it explicitly where it's actually needed.
addopts = --strict-markers -p no:deepeval
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
